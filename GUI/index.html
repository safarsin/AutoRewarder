<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoRewarder</title>

  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <div class="container">
    <h2>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
        <line x1="8" y1="21" x2="16" y2="21"></line>
        <line x1="12" y1="17" x2="12" y2="21"></line>
      </svg>
      AutoRewarder <span class="version">v2.0</span>
    </h2>
      
    <div class="controls">
      <div class="input-group">
        <label for="count_input">Queries:</label>
        <input type="number" id="count_input" value="30" min="1" max="99">
      </div>
      <!-- First Setup creates/validates browser profile before regular runs. -->
      <button id="setup_btn" onclick="start_first_setup()">First Setup</button>
      <button id="start_btn" onclick="start_bot()">Start</button>
    </div>

    <!-- Terminal header: quick actions (history/toggle) + live execution status. -->
    <div class="status-bar">
      <div class="log-left-section">
        <span>SYSTEM.LOG</span>

        <button id="history_btn" onclick="show_history()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          History
        </button>
      </div>

      <div class="log-right-section">
        <div class="hide-browser">
          <label class="switch-container">
            <input type="checkbox" id="hideBrowserToggle">
            <span class="slider"></span>
            <span class="switch-text">Hide browser</span>
          </label>
        </div>

        <div class="status-indicator">
          <div class="dot" id="dot"></div>
          <span id="status_text">Waiting</span>
        </div>
      </div>  
    </div>
      
    <!-- Python pushes messages here via update_log(...) from script.js. -->
    <div id="log_area">Waiting for core startup...<br></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
