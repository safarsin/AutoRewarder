<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Query History</title>

  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="history.css">

</head>
<body>

  <h2>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
    </svg>
    Execution History
  </h2>

  <table class="history-table">
    <thead>
      <tr>
        <th width="16%">Date</th>
        <th width="10%">Time</th>
        <th width="40%">Search Query</th>
        <th width="34%">Status</th>
      </tr>
    </thead>
    <tbody id="table_body">
      <tr>
        <td colspan="4" style="text-align: center; color: var(--text-muted);">Loading history...</td>
      </tr>
    </tbody>
  </table>

  <script>
    // Wait until JS bridge is ready; pywebview.api is not usable before this event.
    window.addEventListener('pywebviewready', function() {
        
      // Fetch history from Python API and render it into table rows.
      pywebview.api.get_history().then(function(data) {
        const tbody = document.getElementById('table_body');
        tbody.innerHTML = ''; // delete loading text

        // if no history records
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No queries have been executed yet.</td></tr>';
          return;
        }

        // make reverse loop to show latest records first
        data.reverse().forEach(item => {
            
          // success -> green, error -> red
          let statusClass = item.status.includes("ERROR") 
            ? "status-error" 
            : "status-success";

          let row = `<tr>
            <td style="color: var(--text-muted); font-size: 13px;">
              ${item.date}
            </td>
            <td style="color: var(--text-muted); font-size: 13px;">
              ${item.time}
            </td>
            <td>${item.query}</td>
            <td class="${statusClass}">${item.status}</td>
          </tr>`;
          
          tbody.innerHTML += row;
        });
      });
    });
  </script>

</body>
</html>
