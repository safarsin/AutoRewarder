<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Query History</title>

  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      display: block;
      padding: 24px;
      overflow: auto;
      user-select: text;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .history-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .history-title svg { color: var(--accent); }

    .account-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      background-color: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .history-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      background-color: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .history-table th {
      text-align: left;
      padding: 10px 14px;
      color: var(--text-dim);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      background-color: var(--surface-2);
    }

    .history-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-soft);
      color: var(--text);
    }

    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background-color: var(--surface-2); }

    .cell-meta {
      color: var(--text-dim);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .status-success { color: var(--success); font-weight: 500; }
    .status-error   { color: var(--danger);  font-weight: 500; }

    .empty-row {
      text-align: center;
      color: var(--text-dim);
      padding: 28px 0;
    }
  </style>
</head>
<body>

  <div class="history-header">
    <h2 class="history-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      Execution history
    </h2>
    <span id="account_pill" class="account-pill" hidden></span>
  </div>

  <table class="history-table">
    <thead>
      <tr>
        <th style="width: 18%;">Date</th>
        <th style="width: 12%;">Time</th>
        <th style="width: 40%;">Query</th>
        <th style="width: 30%;">Status</th>
      </tr>
    </thead>
    <tbody id="table_body">
      <tr>
        <td colspan="4" class="empty-row">Loading…</td>
      </tr>
    </tbody>
  </table>

  <script>
    function avatar_initials_hist(label) {
      const s = (label || '?').trim();
      if (!s) return '?';
      const parts = s.split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 2);
      return (parts[0][0] + parts[parts.length - 1][0]);
    }

    window.addEventListener('pywebviewready', function() {

      pywebview.api.get_current_account().then(function(account) {
        const pill = document.getElementById('account_pill');
        if (!pill) return;
        if (account) {
          pill.hidden = false;
          pill.innerHTML = '';
          const avatar = document.createElement('span');
          avatar.className = 'avatar avatar-sm';
          // Deterministic color (same palette as main UI).
          const palette = ['#5b8eff', '#e879a0', '#f59e0b', '#34d399', '#a78bfa', '#fbbf24', '#fb7185', '#22d3ee'];
          let h = 0; for (let i = 0; i < account.id.length; i++) h = (h * 31 + account.id.charCodeAt(i)) | 0;
          avatar.style.backgroundColor = palette[Math.abs(h) % palette.length];
          avatar.style.color = 'white';
          avatar.textContent = avatar_initials_hist(account.label);
          const text = document.createElement('span');
          text.textContent = account.label;
          pill.appendChild(avatar);
          pill.appendChild(text);
        }
      });

      pywebview.api.get_history().then(function(data) {
        const tbody = document.getElementById('table_body');
        tbody.innerHTML = '';

        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty-row">No runs yet. Start one from the main window.</td></tr>';
          return;
        }

        const rows = data.slice().reverse();
        for (const item of rows) {
          const statusClass = String(item.status).includes('ERROR') ? 'status-error' : 'status-success';
          const tr = document.createElement('tr');
          tr.innerHTML =
            '<td class="cell-meta">' + item.date + '</td>' +
            '<td class="cell-meta">' + item.time + '</td>' +
            '<td>' + item.query + '</td>' +
            '<td class="' + statusClass + '">' + item.status + '</td>';
          tbody.appendChild(tr);
        }
      });
    });
  </script>

</body>
</html>
